name: fixup_app
description: FixUp - Aplikasi Pelaporan Kerusakan Fasilitas Kampus
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  provider: ^6.1.1
  sqflite: ^2.4.2+1
  path_provider: ^2.1.6
  mobile_scanner: ^7.2.0
  path: ^1.9.0
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  supabase_flutter: ^2.6.0

  # Social Login
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  sign_in_with_apple: ^7.0.0

  # Remember Me
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/